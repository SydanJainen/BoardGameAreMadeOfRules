reasoning: |
  City is the most efficient use of resources:
  - Only 1 resource away from building
  - Worth 2 VP (upgrading 1 VP settlement to 2 VP city)
  - Increases future resource production
  - Wheat is your most abundant resource, good trade offer

alternative_strategy: |
  If Ore trade fails:
